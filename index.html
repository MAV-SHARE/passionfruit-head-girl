<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>百香果頭女孩</title>
<meta name="description" content="傾斜手機,讓百香果頭女孩的百香果滾過果肉迷宮。無限關卡、收集花朵、避開蟲蛀洞。">
<meta name="theme-color" content="#170a04">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="百香果頭女孩">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="hud-chip" id="hud-level">LV 1</div>
    <div class="hud-chip" id="hud-stars">★ 0/3</div>
  </div>
  <div class="hud-right">
    <div class="hud-chip" id="hud-time">00:00</div>
    <button class="hud-btn" id="btn-calibrate" title="校準傾斜">◎</button>
    <button class="hud-btn" id="btn-settings" title="設定">⚙</button>
  </div>
</div>
<div id="toast" class="hidden"></div>

<!-- 新版本更新橫幅 -->
<div id="update-banner" class="hidden">
  <span>🎉 發現新版本</span>
  <button id="btn-update">立即更新</button>
</div>

<!-- 開始畫面 -->
<div id="screen-start" class="overlay">
  <div class="panel">
    <div class="logo-orb"></div>
    <h1 id="title-main">百香果頭女孩</h1>
    <p class="subtitle" id="title-sub">PASSIONFRUIT HEAD GIRL</p>
    <p class="desc" id="title-desc">傾斜你的手機,讓百香果滾過果肉迷宮。<br>收集花朵、避開蟲蛀洞、滾進果汁漩渦。</p>
    <div class="best" id="best-line"></div>
    <button class="btn-primary" id="btn-start">開始遊戲</button>
    <button class="btn-ghost" id="btn-settings-start">設定</button>
    <p class="hint" id="control-hint">手機:傾斜操作 &nbsp;|&nbsp; 電腦:方向鍵 / 拖曳</p>
  </div>
</div>

<!-- 過關畫面 -->
<div id="screen-clear" class="overlay hidden">
  <div class="panel">
    <!-- 百香果頭少女:剖半百香果當頭的女孩,吃刨冰乘涼(僅百香果主題顯示) -->

        <defs>
          <radialGradient id="m-pulp" cx="42%" cy="38%" r="75%">
            <stop offset="0%" stop-color="#ffd95e"/>
            <stop offset="60%" stop-color="#f7b93a"/>
            <stop offset="100%" stop-color="#e79c22"/>
          </radialGradient>
        </defs>
        <!-- 地面影子 -->
        <ellipse cx="112" cy="164" rx="60" ry="7" fill="rgba(0,0,0,0.3)"/>
        <g class="m-bob">
          <!-- 腿與鞋 -->
          <line x1="103" y1="128" x2="103" y2="149" stroke="#ffd9b8" stroke-width="5" stroke-linecap="round"/>
          <line x1="121" y1="128" x2="121" y2="149" stroke="#ffd9b8" stroke-width="5" stroke-linecap="round"/>
          <ellipse cx="102" cy="152" rx="7" ry="4.5" fill="#4a1631"/>
          <ellipse cx="122" cy="152" rx="7" ry="4.5" fill="#4a1631"/>
          <!-- 脖子 -->
          <rect x="108" y="80" width="8" height="10" rx="3" fill="#ffd9b8"/>
          <!-- 洋裝 -->
          <path d="M94 90 Q112 84 130 90 L141 131 Q112 141 83 131 Z" fill="#8f3a6b"/>
          <path d="M85 124 Q112 134 139 124" stroke="#ffb52e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="112" cy="102" r="2" fill="#ffd66e"/>
          <circle cx="112" cy="112" r="2" fill="#ffd66e"/>
          <ellipse cx="112" cy="89" rx="9" ry="3.5" fill="#fff7ea"/>
          <!-- 頭:剖半百香果(果皮 → 白色內皮 → 果肉臉) -->
          <circle cx="112" cy="52" r="34" fill="#5a1e3e"/>
          <circle cx="112" cy="52" r="29.5" fill="#f6e8d8"/>
          <circle cx="112" cy="52" r="26" fill="url(#m-pulp)"/>
          <!-- 果肉黑籽(避開臉的位置) -->
          <g fill="#2e1608">
            <ellipse cx="112" cy="33.5" rx="3.6" ry="2.8"/>
            <ellipse cx="95" cy="41" rx="3.6" ry="2.8" transform="rotate(-40 95 41)"/>
            <ellipse cx="129" cy="41" rx="3.6" ry="2.8" transform="rotate(40 129 41)"/>
            <ellipse cx="90" cy="58" rx="3.6" ry="2.8" transform="rotate(-80 90 58)"/>
            <ellipse cx="134" cy="58" rx="3.6" ry="2.8" transform="rotate(80 134 58)"/>
          </g>
          <g fill="rgba(255,245,215,0.75)">
            <circle cx="111" cy="32.8" r="0.9"/>
            <circle cx="94" cy="40.2" r="0.9"/>
            <circle cx="128" cy="40.2" r="0.9"/>
          </g>
          <!-- 頭頂嫩芽 + 百香果花髮飾 -->
          <path d="M112 18 Q111 11 107 8" stroke="#5d8a34" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="102" cy="7" rx="7" ry="4" fill="#6fae3d" transform="rotate(-26 102 7)"/>
          <ellipse cx="116" cy="5" rx="6" ry="3.5" fill="#8cc455" transform="rotate(16 116 5)"/>
          <g transform="translate(86 29)">
            <g fill="#fdf8ff">
              <ellipse rx="5.5" ry="2.2" transform="rotate(0)"/>
              <ellipse rx="5.5" ry="2.2" transform="rotate(60)"/>
              <ellipse rx="5.5" ry="2.2" transform="rotate(120)"/>
            </g>
            <circle r="2.4" fill="#7b3fa0"/>
            <circle r="1.1" fill="#ffd23e"/>
          </g>
          <!-- 臉 -->
          <g class="m-eye">
            <circle cx="101" cy="54" r="4.6" fill="#241008"/>
            <circle cx="102.6" cy="52.4" r="1.5" fill="#fff"/>
          </g>
          <g class="m-eye">
            <circle cx="123" cy="54" r="4.6" fill="#241008"/>
            <circle cx="124.6" cy="52.4" r="1.5" fill="#fff"/>
          </g>
          <ellipse cx="93" cy="63" rx="5.5" ry="3" fill="rgba(255,110,110,0.5)"/>
          <ellipse cx="131" cy="63" rx="5.5" ry="3" fill="rgba(255,110,110,0.5)"/>
          <!-- 吃冰的嘴(開口) -->
          <ellipse cx="112" cy="68" rx="5.5" ry="4" fill="#7a2430"/>
          <ellipse cx="112" cy="70" rx="3.2" ry="1.7" fill="#e86a6a"/>
          <!-- 左手:湯匙(舀刨冰) -->
          <g class="m-arm-spoon">
            <path d="M96 94 Q86 106 79 120" stroke="#ffd9b8" stroke-width="5.5" fill="none" stroke-linecap="round"/>
            <circle cx="78" cy="122" r="4.5" fill="#ffd9b8"/>
            <line x1="78" y1="122" x2="68" y2="139" stroke="#b9c2cf" stroke-width="3.5" stroke-linecap="round"/>
            <ellipse cx="66" cy="142" rx="5" ry="3.6" fill="#cfd6e0"/>
            <circle cx="66" cy="140" r="3" fill="#ffffff"/>
          </g>
          <!-- 右手:小圓扇(乘涼) -->
          <g class="m-arm-fan">
            <path d="M128 94 Q140 104 149 113" stroke="#ffd9b8" stroke-width="5.5" fill="none" stroke-linecap="round"/>
            <circle cx="150" cy="114" r="4.5" fill="#ffd9b8"/>
            <line x1="150" y1="114" x2="161" y2="101" stroke="#c98a3a" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="166" cy="94" r="12" fill="#ffedc2" stroke="#e88f2a" stroke-width="2.5"/>
            <path d="M166 83 V105 M156.6 88.5 L175.4 99.5 M156.6 99.5 L175.4 88.5" stroke="#e8b46a" stroke-width="1.4"/>
          </g>
        </g>
        <!-- 刨冰(玻璃碗 + 冰山 + 百香果醬) -->
        <g class="m-ice">
          <circle cx="42" cy="128" r="9" fill="#fdfdfd"/>
          <circle cx="58" cy="124" r="11" fill="#ffffff"/>
          <circle cx="50" cy="116" r="9" fill="#fdfdfd"/>
          <path d="M40 124 Q50 108 60 124 Q56 130 50 129 Q44 130 40 124 Z" fill="#ffab2e" opacity="0.9"/>
          <ellipse cx="47" cy="119" rx="2" ry="1.4" fill="#2e1608"/>
          <ellipse cx="55" cy="121" rx="2" ry="1.4" fill="#2e1608"/>
          <path d="M28 133 L74 133 L67 160 L35 160 Z" fill="#8fd6f2" opacity="0.92"/>
          <ellipse cx="51" cy="133" rx="23" ry="5" fill="#c4ecfb"/>
          <path d="M33 152 L69 152 L67 160 L35 160 Z" fill="#6bbfe2"/>
          <!-- 涼氣 -->
          <path class="m-cool" d="M30 108 q4 -6 0 -12 M42 102 q4 -6 0 -12" stroke="#bfe9ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>
        <!-- 微風線(乘涼) -->
        <g class="m-breeze" stroke="#ffd9a0" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M196 128 q10 3 18 -2"/>
          <path d="M192 140 q12 4 22 -1"/>
        </g>
      </svg>
    </div>
    <h2 id="clear-title">抵達傳送門!</h2>
    <div class="clear-stars" id="clear-stars">★★★</div>
    <div class="clear-grid">
      <div><span class="label">時間</span><span id="clear-time">00:00</span></div>
      <div><span class="label">本關得分</span><span id="clear-score">0</span></div>
      <div><span class="label">總分</span><span id="clear-total">0</span></div>
    </div>
    <button class="btn-primary" id="btn-next">下一關 ➜</button>
    <button class="btn-ghost" id="btn-replay">重玩本關</button>
    <button class="btn-ghost" id="btn-clear-menu">關卡選單</button>
  </div>
</div>

<!-- 系列選單(每系列 10 關) -->
<div id="screen-series" class="overlay hidden">
  <div class="panel">
    <h2>選擇系列</h2>
    <div id="series-list"></div>
    <div class="best" id="series-total"></div>
  </div>
</div>

<!-- 關卡選擇(1~10) -->
<div id="screen-levels" class="overlay hidden">
  <div class="panel">
    <h2 id="levels-title">系列</h2>
    <div id="level-grid"></div>
    <button class="btn-ghost" id="btn-back-series">← 返回系列選單</button>
  </div>
</div>

<!-- 水平校準畫面 -->
<div id="screen-level" class="overlay hidden">
  <div class="panel">
    <h2>水平校準</h2>
    <p class="desc">請將手機<strong>平放在桌面</strong>等水平表面上,<br>之後的傾斜操作都會以這個平面為基準。</p>
    <div class="level-gauge">
      <div id="level-bubble"></div>
    </div>
    <div class="level-status" id="level-status">偵測中…</div>
    <button class="btn-primary" id="btn-level-confirm" disabled>確認校準</button>
    <button class="btn-ghost" id="btn-level-skip">略過(以目前握持角度為基準)</button>
  </div>
</div>

<!-- 設定畫面 -->
<div id="screen-settings" class="overlay hidden">
  <div class="panel">
    <h2>設定</h2>
    <label class="setting-row">
      <span>傾斜靈敏度</span>
      <input type="range" id="set-sensitivity" min="0.5" max="2" step="0.1" value="1">
    </label>
    <label class="setting-row toggle">
      <span>音效</span>
      <input type="checkbox" id="set-sound" checked>
    </label>
    <label class="setting-row toggle">
      <span>震動回饋</span>
      <input type="checkbox" id="set-vibrate" checked>
    </label>
    <button class="btn-ghost" id="btn-exit-level">離開本關(回關卡選單)</button>
    <button class="btn-ghost" id="btn-reset-progress">重置進度</button>
    <button class="btn-primary" id="btn-close-settings">返回</button>
  </div>
</div>

<script src="js/game.js"></script>
<script>
// Service Worker 註冊 + 自動偵測新版本
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('sw.js');

      function promptUpdate(worker) {
        const banner = document.getElementById('update-banner');
        banner.classList.remove('hidden');
        document.getElementById('btn-update').onclick = () => {
          banner.classList.add('hidden');
          worker.postMessage({ type: 'SKIP_WAITING' });
        };
      }
      // 已有等待中的新版本(上次載入時裝好的)
      if (reg.waiting && navigator.serviceWorker.controller) promptUpdate(reg.waiting);
      // 背景下載到新版本
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) promptUpdate(nw);
        });
      });
      // 新 SW 接管後重新載入,套用新版
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
      // 定期 + 回到前景時檢查更新
      setInterval(() => reg.update(), 30 * 60 * 1000);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) reg.update();
      });
    } catch { /* SW 註冊失敗不影響遊戲 */ }
  });
}
</script>
</body>
</html>
